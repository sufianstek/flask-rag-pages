<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Clinical Documents</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
	<style>
		body {
			background: linear-gradient(120deg, #f6f8fb, #eaf1f9 50%, #f7f3ec);
			min-height: 100vh;
			padding-bottom: 74px;
		}

		.page-title {
			letter-spacing: 0.03em;
		}

		.doc-card {
			border: 0;
			border-radius: 14px;
			overflow: hidden;
			box-shadow: 0 10px 24px rgba(31, 41, 55, 0.12);
			transition: transform 0.2s ease, box-shadow 0.2s ease;
			background-color: #ffffff;
		}

		.doc-card:hover {
			transform: translateY(-4px);
			box-shadow: 0 16px 28px rgba(31, 41, 55, 0.16);
		}

		.thumb-wrap {
			background: #f0f3f8;
			aspect-ratio: 400 / 565;
			overflow: hidden;
		}

		.thumb-wrap img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		.chat-sticky-bar {
			position: fixed;
			left: 0;
			right: 0;
			bottom: 0;
			z-index: 1100;
			background: rgba(33, 37, 41, 0.95);
			padding: 0.5rem 0.75rem;
			border-top: 1px solid rgba(255, 255, 255, 0.1);
		}

		.chat-sticky-inner {
			max-width: 900px;
			margin: 0 auto;
			display: flex;
			gap: 0.5rem;
			align-items: center;
		}

		.chat-sticky-inner input {
			min-width: 0;
		}

	</style>
</head>
<body>
	<main class="container py-5">
		<div class="mb-4 mb-md-5">
			<h1 class="page-title fw-bold mb-2">Clinical Document Library</h1>
			<p class="text-secondary mb-0">Open any document to browse all converted page images.</p>
		</div>

		{% if documents %}
		<div class="row g-4">
			{% for doc in documents %}
			<div class="col-12 col-sm-6 col-xl-4">
				<a class="text-decoration-none" href="{{ url_for('document_pages', doc_id=doc.id) }}">
					<article class="card doc-card h-100">
						<div class="thumb-wrap">
							<img
								src="{{ url_for('static', filename='pages/' + doc.folder + '/' + doc.thumbnail) }}"
								alt="{{ doc.title }} first page thumbnail"
								loading="lazy"
								width="400"
								height="565"
							>
						</div>
						<div class="card-body">
							<h2 class="h5 text-dark mb-2">{{ doc.title }}</h2>
							<p class="text-secondary mb-0">{{ doc.page_count }} page images</p>
						</div>
					</article>
				</a>
			</div>
			{% endfor %}
		</div>
		{% else %}
		<div class="alert alert-warning mb-0" role="alert">
			No document page folders found in <code>static/pages</code>.
		</div>
		{% endif %}
	</main>

	<div class="chat-sticky-bar">
		<form id="index-chat-form" class="chat-sticky-inner">
			<input id="index-chat-input" class="form-control" type="text" placeholder="Ask in AI chat..." autocomplete="off">
			<input id="index-context-toggle" class="btn-check" type="checkbox" autocomplete="off" checked>
			<label id="context-toggle-label" class="btn btn-outline-light" for="index-context-toggle" title="Use retrieval context">Context</label>
			<button class="btn btn-primary" type="submit">Chat</button>
		</form>
	</div>

	<script>
		document.getElementById('index-chat-form').addEventListener('submit', function(event) {
			event.preventDefault();
			var prompt = (document.getElementById('index-chat-input').value || '').trim();
			var useContext = document.getElementById('index-context-toggle').checked;
			var target = '{{ url_for("chat_page") }}';
			if (!useContext) {
				target += '?context=0';
			}
			if (prompt) {
				target += (useContext ? '?' : '&') + 'q=' + encodeURIComponent(prompt) + '&submit=1';
			}
			if (target !== '{{ url_for("chat_page") }}') {
				window.location.href = target;
			}
		});
	</script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
</body>
</html>
